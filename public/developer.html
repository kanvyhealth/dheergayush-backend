<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katari Yaswanth Kumar - MERN Stack Developer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8b5a3 0%, #c9d1c6 50%, #e8ede6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-card {
            background: rgba(248, 250, 247, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(168, 181, 163, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: slideUp 0.8s ease-out;
        }

        .profile-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.15);
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(168, 181, 163, 0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 25px;
            position: relative;
            background: linear-gradient(135deg, #8b9d87, #a8b5a3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .profile-image::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(45deg, #a8b5a3, #c9d1c6, #8b9d87, #b8c4b5);
            border-radius: 50%;
            z-index: -1;
            animation: rotate 12s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4a5446;
            margin-bottom: 10px;
            letter-spacing: 1px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .title {
            font-size: 1.1rem;
            color: #6b7567;
            margin-bottom: 25px;
            font-weight: 500;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .tech-stack {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .tech-item {
            background: rgba(168, 181, 163, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #2d3329;
            border: 1px solid rgba(168, 181, 163, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-weight: 500;
        }

        .tech-item:hover {
            background: rgba(168, 181, 163, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: #2d3329;
            border-radius: 50%;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            border: 1px solid #2d3329;
            position: relative;
            overflow: hidden;
        }

        .social-link::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }

        .social-link:hover::before {
            width: 100%;
            height: 100%;
        }

        .social-link:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .social-link i {
            position: relative;
            z-index: 1;
        }

        .linkedin:hover {
            background: #0077b5;
            color: white;
            border-color: #0077b5;
        }

        .email:hover {
            background: #ea4335;
            color: white;
            border-color: #ea4335;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .floating-icons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-icon {
            position: absolute;
            color: rgba(45, 51, 41, 0.1);
            font-size: 1.5rem;
            animation: float 6s ease-in-out infinite;
        }

        .floating-icon:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-icon:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .floating-icon:nth-child(3) { bottom: 30%; left: 20%; animation-delay: 2s; }
        .floating-icon:nth-child(4) { bottom: 20%; right: 10%; animation-delay: 3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        @media (max-width: 480px) {
            .profile-card {
                padding: 30px 20px;
            }
            
            .name {
                font-size: 1.5rem;
            }
            
            .tech-stack {
                gap: 10px;
            }
            
            .tech-item {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }

        .contact-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(168, 181, 163, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(168, 181, 163, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            animation: none;
        }

        .contact-info.show {
            opacity: 1;
            transform: translateY(0);
        }

        .contact-info p {
            margin: 0;
            color: #2d3329;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .contact-info strong {
            color: #4a5446;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="floating-icons">
            <i class="fas fa-code floating-icon"></i>
            <i class="fab fa-react floating-icon"></i>
            <i class="fab fa-node-js floating-icon"></i>
            <i class="fas fa-database floating-icon"></i>
        </div>
        
        <div class="profile-image">
            <i class="fas fa-user-tie"></i>
        </div>
        
        <h1 class="name">Katari Yaswanth Kumar</h1>
        <p class="title">MERN Stack Developer</p>
        
        <div class="tech-stack">
            <div class="tech-item">MongoDB</div>
            <div class="tech-item">Express.js</div>
            <div class="tech-item">React.js</div>
            <div class="tech-item">Node.js</div>
            <div class="tech-item">JavaScript</div>
        </div>
        
        <div class="social-links">
            <a href="https://www.linkedin.com/in/yaswanthkumar-katari" class="social-link linkedin" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-linkedin-in"></i>
            </a>
            <a href="mailto:yaswanthkumar89777@gmail.com" class="social-link email" onclick="showContactInfo(event)">
                <i class="fas fa-envelope"></i>
            </a>
        </div>
        
        <div class="contact-info" id="contactInfo">
            <p><strong>Email:</strong> yaswanthkumar89777@gmail.com</p>
        </div>
    </div>

    <script>
        function showContactInfo(event) {
            event.preventDefault();
            const contactInfo = document.getElementById('contactInfo');
            contactInfo.classList.toggle('show');
        }
    </script>
    <script src="js/dg-responsive-nav.js"></script>
</body>
</html>
