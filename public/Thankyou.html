<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - DHEERGAYUSH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }

        .thank-you-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo img {
            max-width: min(100%, 320px);
            height: auto;
            object-fit: contain;
        }

        .message {
            color: #34495e;
            font-size: 1.8em;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .sub-message {
            color: #7f8c8d;
            font-size: 1.2em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .return-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .return-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .heart {
            color: #e74c3c;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="thank-you-card">
        <div class="logo"><img src="/logos/logo-horizontal.png" alt="DHEERGAYUSH"></div>
        <h1 class="message">Thank You for Choosing Us</h1>
        <p class="sub-message">
            Don't worry, you're in good hands. Our expert doctors are here to help you get better. 
            Remember, every healing journey begins with a single step, and you've already taken it 
            <span class="heart">❤</span>
        </p>
        <a href="/" class="return-btn">Return to Home</a>
    </div>
    <script src="js/dg-responsive-nav.js"></script>
</body>
</html>
