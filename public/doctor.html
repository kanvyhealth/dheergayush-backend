<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login - Dheergayush</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Roboto:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/dheergayush-theme.css">
    <link rel="stylesheet" href="css/dheergayush-forms.css">
    <style>
        /* Specific styles for doctor.html layout */
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dg-page-bg-cover, linear-gradient(135deg, #fff8e1 0%, #fafafa 45%, rgba(242, 103, 39, 0.1) 100%)); /* Use your background image */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 400px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-card h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
            width: 100%;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            text-align: left;
        }

        /* Form fields styled via css/dheergayush-forms.css */

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            display: none; /* Hidden by default */
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
            display: block;
        }
        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border-color: #bee5eb;
            display: block;
        }

        /* The .button styles are pulled from your style.css */
    </style>
</head>
<body class="dg-page auth-page login-page">
    <div class="login-card dg-form-panel">
        <h2>Doctor Login</h2>
        <p style="font-size:0.9rem;color:#666;margin-bottom:16px;">Use the same email and password as the DHEERGAYUSH mobile app.</p>
        <form id="doctorLoginForm">
            <div class="form-group">
                <label for="doctorEmail">Email</label>
                <input type="email" id="doctorEmail" name="doctorEmail" placeholder="doctor@email.com" required>
            </div>
            <div class="form-group">
                <label for="doctorPassword">Password</label>
                <input type="password" id="doctorPassword" name="doctorPassword" placeholder="Password" required minlength="6">
            </div>
            <button type="submit" class="button">
                <div class="button__content">
                    <div class="button__icon">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C10.897 2 10 2.897 10 4S10.897 6 12 6 14 5.103 14 4 13.103 2 12 2zM18 14H16V12C16 10.897 15.103 10 14 10H10C8.897 10 8 10.897 8 12V14H6C4.897 14 4 14.897 4 16V20H6V18H18V20H20V16C20 14.897 19.103 14 18 14zM10 12H14V14H10V12Z"/>
                        </svg>
                    </div>
                    <p class="button__text">Login</p>
                </div>
            </button>
            <div id="message" class="message"></div>
        </form>
    </div>

    <script src="js/dg-auth.js"></script>
    <script src="doctor.js"></script>
    <script src="js/dg-responsive-nav.js"></script>
</body>
</html>
